services:
  mock:
    build: ./loadtest
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9090/health"]
      interval: 5s
      timeout: 3s
      retries: 3

  proxy:
    build: .
    ports:
      - "8080:8080"
    volumes:
      - ./models:/app/models:ro
      - ./backend/data:/app/data
      - ./loadtest/config.loadtest.yaml:/app/config.yaml
    environment:
      JAVA_TOOL_OPTIONS: >-
        -Xlog:gc*:file=/app/gc.log:time,uptime,level,tags:filecount=5,filesize=10m
        -Xms256m -Xmx512m
        -XX:+UseG1GC
    depends_on:
      mock:
        condition: service_healthy

  k6:
    image: grafana/k6:latest
    volumes:
      - ./loadtest/scripts:/scripts:ro
      - ./loadtest/results:/results
    depends_on:
      - proxy
    profiles:
      - loadtest
