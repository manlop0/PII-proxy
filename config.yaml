# Server settings for the PII Proxy
server:
  port: 8080

# Upstream LLM providers (config-driven, loaded by AppConfigurator)
# Each provider needs: host, port, and optionally a codec.
#   codec: "openai" (default) — OpenAI-compatible JSON format (also works for OpenRouter, etc.)
#   codec: "com.project.piiproxy.provider.codec.MyCustomCodec" — FQCN of a class implementing LlmJsonCodec with a no-arg constructor.
#                       Custom codecs live under com.project.piiproxy.provider.codec.* and are loaded via reflection at startup.
providers:
  openai:
    host: api.openai.com
    port: 443
  openrouter:
    host: openrouter.ai
    port: 443

# Settings for the embedded local database
storage:
  path: "./data/pii-cache.db"

# Logging configuration
logging:
  # Supported levels: TRACE, DEBUG, INFO, WARN, ERROR
  # Use DEBUG to see tag mappings and text analysis details
  level: "INFO"

# Machine Learning pipeline configuration (ONNX Runtime)
ml:
  # Path to the directory containing ONNX model, config.json and tokenizer.json.
  # Replace <your-model> with the directory name of model after downloading and converting it to onnx format in ./models/.
  model_directory: "./models/<your-model>"
  # Maximum number of texts to process in a single batch
  batch_size: 16
  # Maximum time to wait for a batch to fill up before processing (in milliseconds)
  batch_timeout_ms: 10
  # Maximum number of pending ML requests. When full, new requests are rejected with 503.
  max_queue_size: 1000
  # Scheme used by the model for sequence labeling.
  #   output_adapter: "BIO" (default) — Beginning-Inside-Outside scheme with continuation tokens.
  #   output_adapter: "SIMPLE" — flat tag scheme without prefix.
  #   output_adapter: "com.project.piiproxy.pipeline.filter.ml.adapter.MyCustomAdapter" — FQCN of a class implementing ModelOutputAdapter.
  #                       Custom adapters live under com.project.piiproxy.pipeline.filter.ml.adapter.* and are loaded via reflection at startup.
  output_adapter: "BIO"
  # Tags produced by the ML model that should be ignored (e.g. MISC, DATE)
  ignored_tags: [ ]

  # Optional: Map internal ML tags to more descriptive tags for LLM context.
  # For example, mapping 'LOC' to 'LOCATION' will produce <LOCATION_1> instead of <LOC_1>.
  # Uncomment and adjust entries to match the labels produced by your model.
  # tag_mapping:
  #   <original-tag>: "<human-readable-name>"

# Core anonymization pipeline configuration
pipeline:
  # Smart entity resolution (Fuzzy Matching)
  # This feature groups morphological variations or typos of the same entity under a single tag.
  entity_resolution:
    enabled: true
    # Supported algorithms:
    #   algorithm: "jaro-winkler" (default) — Best for names and morphological changes (prioritizes prefix matches).
    #   algorithm: "exact" — Disables fuzzy matching, requires 100% exact string match.
    #   algorithm: "com.project.piiproxy.pipeline.state.resolution.MyCustomStrategy" — FQCN of a class implementing EntityResolutionStrategy.
    #                       Custom strategies live under com.project.piiproxy.pipeline.state.resolution.* and are loaded via reflection at startup.
    algorithm: "jaro-winkler"
    # Similarity threshold (0.0 to 1.0). Higher means stricter matching. 0.88 is a good balance for names.
    threshold: 0.88
    # Only these entity types will undergo fuzzy matching.
    # All other types (PHONE, EMAIL, IP_ADDRESS, CREDIT_CARD) will strictly require exact matches
    # to prevent dangerous merging of distinct identifiers.
    # Use the MAPPED tag names from tag_mapping above (e.g. "PERSON", not the raw "PER").
    # fuzzy_types: [ "<your-type-1>", "<your-type-2>" ]

  # System prompt injected to instruct the LLM on how to handle the <TAGS>
  gateway_system_prompt: >
    System Note: Enterprise Data Privacy Gateway Active.
    You will see entities formatted as tags in the text (e.g., <PERSON_1>, <PHONE_1>, <CREDIT_CARD_1>).
    CRITICAL INSTRUCTION: You MUST treat these tags as the literal, actual data.
    Treat <PERSON_1> as the person's actual name, and <PHONE_1> as the actual phone number.
    Interact with them naturally, logically, and empathetically as concrete entities, NOT as placeholders or templates.
    Do NOT mention that the data is masked or anonymized.
    Always output these exact tags including '<' and '>' symbols when referring to these entities in your reasoning and final response..

  # Strategy for resolving overlapping spans between regex and ML filters.
  # Available options:
  # - REGEX_PRIORITY: Regex matches always override ML predictions if they overlap.
  # - LONGEST_WINS: The longest matched span wins, regardless of its source.
  conflict_strategy: "REGEX_PRIORITY"

  # Fast, deterministic Regular Expression filters. Each entry is either a built-in shortname or an FQCN.
  #   Built-in shortnames (live under com.project.piiproxy.pipeline.filter.regex.*):
  #     - "email"        — email addresses (RFC 5322 simplified pattern)
  #     - "phone"        — phone numbers (international / parenthesized / dashed formats)
  #     - "credit_card"  — credit card numbers with Luhn validation
  #     - "ip_address"   — IPv4 addresses in dotted-quad notation
  #   Custom filters: use the FQCN of a class implementing TextFilter with a public no-arg constructor.
  #                   Custom filters live under com.project.piiproxy.pipeline.filter.regex.* and are loaded via reflection at startup.
  # Example:
  #   filters:
  #     names:
  #       - "email"
  #       - "phone"
  #       - "credit_card"
  #       - "ip_address"
  #       - "com.project.piiproxy.pipeline.filter.regex.MyCustomRegexFilter"
  filters:
    names:
      - "email"
      - "phone"
      - "credit_card"
      - "ip_address"